# Render Blueprint for ParkEase.
# Docs: https://render.com/docs/blueprint-spec
#
# If Render assigns different public subdomains, update:
# - frontend env NEXT_PUBLIC_API_URL
# - backend env CORS_ORIGINS

services:
  - type: web
    name: parkease-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 8080
      - key: APP_ENV
        value: production
      - key: DB_AUTO_MIGRATE
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: parkease-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 168h
      - key: CORS_ORIGINS
        value: https://parkease-web.onrender.com

  - type: web
    name: parkease-web
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        value: https://parkease-api.onrender.com/api/v1

databases:
  - name: parkease-db
    databaseName: parking
    user: parkease
    region: frankfurt
    plan: basic-256mb
    postgresMajorVersion: 16
